function parseSalary(s) {
  if (!s) return 0;
  s = s.replace(/,/g,'');
  var m;
  m = s.match(/(\d+)-?(\d*)元\/月/);
  if (m) { var v = parseInt(m[1]); if (m[2]) v = (v + parseInt(m[2])) / 2; return v / 22; }

// 获取区域的主区域
function getMainArea(areaStr) {
  if (!areaStr) return '多区域';
  var areas = ['开福区','天心区','雨花区','岳麓区','芙蓉区','望城区','长沙县'];
  for (var i = 0; i < areas.length; i++) {
    if (areaStr.indexOf(areas[i]) !== -1) return areas[i];
  }
  if (areaStr.indexOf('线上') !== -1) return '线上';
  return '多区域';
}

// 计算距离和通勤
function calcInfo(district) {
  var main = district || '多区域';
  var cfg = areaConfig[main] || areaConfig['多区域'];
  var dist = ((cfg.distMin + cfg.distMax) / 2).toFixed(1);
  var commute = ((cfg.commuteMin + cfg.commuteMax) / 2).toFixed(0);
  return {dist: dist, commute: commute, main: main};
}

// 状态
var currentArea = 'all';
var currentSort = 'default';

// 渲染
function render() {
  var list = document.getElementById('jobList');
  var filtered = rawData.filter(function(j) {
    if (currentArea === 'all') return true;
    return getMainArea(j.district) === currentArea;
  });

  // 排序
  if (currentSort === 'distance') {
    filtered.sort(function(a, b) {
      return parseFloat(calcInfo(a.district).dist) - parseFloat(calcInfo(b.district).dist);
    });
  } else if (currentSort === 'commute') {
    filtered.sort(function(a, b) {
      return parseInt(calcInfo(a.district).commute) - parseInt(calcInfo(b.district).commute);
    });
  } else if (currentSort === 'salary') {
    filtered.sort(function(a, b) {
      return parseSalary(b.salary) - parseSalary(a.salary);
    });
  } else if (currentSort === 'date') {
    filtered.sort(function(a, b) {
      return (b.date || '').localeCompare(a.date || '');
    });
  }

  document.getElementById('statsText').textContent = '共 ' + filtered.length + ' 条';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">暂无该区域的兼职信息</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var j = filtered[i];
    var info = calcInfo(j.district);
    
    // 来源标签
    var sourceTags = '';
    for (var s = 0; s < j.sources.length; s++) {
      sourceTags += '<span class="source-tag">' + j.sources[s] + '</span>';
    }
    // 发布日期
    var dateStr = j.date ? '<span style="margin-left:auto;font-size:11px;color:#999">📅 ' + j.date + '</span>' : '';
    
    // 距离信息（线上工作不显示）
    var distanceHtml = '';
    if (info.dist > 0) {
      distanceHtml = '<span><strong>' + info.dist + 'km</strong></span><span>通勤约<strong>' + info.commute + '分钟</strong></span>';
    } else {
      distanceHtml = '<span>线上工作</span>';
    }
    
    // 微信号显示
    var wechatHtml = '';
    if (j.wechat && j.wechat !== '未提供') {
      wechatHtml = '<div class="info-row"><span class="icon">📱</span><span class="label">微信：</span><span class="value"><span class="wechat-display">' + j.wechat + '</span></span></div>';
    }
    
    // 班次标签
    var shiftHtml = '';
    if (j.shift) {
      var shiftClass = 'shift-unknown';
      var shiftIcon = '🕐';
      if (j.shift.indexOf('白班') >= 0 && j.shift.indexOf('晚班') >= 0) {
        shiftClass = 'shift-day';
        shiftIcon = '🔄';
      } else if (j.shift.indexOf('白班') >= 0 || j.shift.indexOf('长白班') >= 0) {
        shiftClass = 'shift-day';
        shiftIcon = '☀️';
      } else if (j.shift.indexOf('晚班') >= 0) {
        shiftClass = 'shift-night';
        shiftIcon = '🌙';
      } else if (j.shift.indexOf('夜班') >= 0 || j.shift.indexOf('通宵') >= 0) {
        shiftClass = 'shift-night';
        shiftIcon = '🌃';
      } else if (j.shift.indexOf('中班') >= 0) {
        shiftClass = 'shift-mid';
        shiftIcon = '🌤️';
      } else if (j.shift.indexOf('全天') >= 0) {
        shiftClass = 'shift-allday';
        shiftIcon = '⏰';
      }
      shiftHtml = '<span class="shift-tag ' + shiftClass + '">' + shiftIcon + ' ' + j.shift + '</span>';
    }

    // 工时标签
    var hoursHtml = '';
    if (j.hours) {
      hoursHtml = '<span class="shift-tag shift-mid">⏱️ ' + j.hours + '</span>';
    }

    // 班次工时行
    var shiftRowHtml = '';
    if (shiftHtml || hoursHtml) {
      shiftRowHtml = '<div class="info-row"><span class="icon">⏰</span><span class="label">班次：</span><span class="value">' + shiftHtml + hoursHtml + '</span></div>';
    }

    // 要求行 - 解析并分类显示
    var reqHtml = '';
    if (j.requirements) {
      var req = j.requirements;
      // 提取年龄要求
      var ageMatch = req.match(/(\d{1,2})[-~—](\d{1,2})岁/);
      // 提取性别要求
      var genderParts = [];
      if (/女生|女性|仅女|限女/.test(req)) genderParts.push('女');
      if (/男生|男性|仅男|限男/.test(req)) genderParts.push('男');
      if (/男女不限/.test(req)) genderParts.push('男女不限');
      // 提取身高要求
      var heightMatch = req.match(/身高(\d+\.?\d*)[米cm以上]+/);
      // 提取其他关键要求
      var otherReqs = req;
      // 移除已提取的部分，保留剩余
      if (ageMatch) otherReqs = otherReqs.replace(ageMatch[0], '');
      genderParts.forEach(function(g) { otherReqs = otherReqs.replace(g === '男女不限' ? '男女不限' : (g === '女' ? /女生|女性|仅女|限女/ : /男生|男性|仅男|限男/), ''); });
      if (heightMatch) otherReqs = otherReqs.replace(heightMatch[0], '');
      otherReqs = otherReqs.replace(/^[,，\s]+|[,，\s]+$/g, '').replace(/[,，]{2,}/g, '，');
      
      var tags = '';
      if (ageMatch) tags += '<span class="req-tag">👤 ' + ageMatch[0] + '</span>';
      if (genderParts.length) tags += '<span class="req-tag">🚻 ' + genderParts.join('/') + '</span>';
      if (heightMatch) tags += '<span class="req-tag">📏 ' + heightMatch[0] + '</span>';
      // 提取包吃住
      if (/包吃|包餐|包饭|包3餐|包两餐|包中餐|包工作餐/.test(req)) tags += '<span class="req-tag">🍱 包餐</span>';
      if (/包住/.test(req)) tags += '<span class="req-tag">🏠 包住</span>';
      if (/包水/.test(req)) tags += '<span class="req-tag">💧 包水</span>';
      // 提取经验/证件要求
      if (/有经验|必须有经验|有促销经验|有地推经验|有秀场/.test(req)) tags += '<span class="req-tag req-extra">⚠️ 需经验</span>';
      if (/健康证/.test(req)) tags += '<span class="req-tag req-extra">⚠️ 需健康证</span>';
      if (/保安证/.test(req)) tags += '<span class="req-tag req-extra">⚠️ 需保安证</span>';
      if (/无犯罪记录|无案底/.test(req)) tags += '<span class="req-tag">✅ 无犯罪记录</span>';
      if (/无纹身|无明显纹身/.test(req)) tags += '<span class="req-tag">✅ 无纹身</span>';
      if (/无染发|无烫染|短发/.test(req)) tags += '<span class="req-tag">✅ 无染发/短发</span>';
      if (/无美甲/.test(req)) tags += '<span class="req-tag">✅ 无美甲</span>';
      // 提取连续工作要求
      if (/最少连续|必须连做|一个月起做|最少做三个月|最少做到/.test(req)) {
        var durMatch2 = req.match(/(最少连续做\d+天|必须连做|一个月起做|最少做三个月|最少做到[\d.]+)/);
        if (durMatch2) tags += '<span class="req-tag req-extra">📌 ' + durMatch2[0] + '</span>';
      }
      
      // 剩余的其他要求
      if (otherReqs && otherReqs.length > 1) {
        tags += '<span class="req-tag">📝 ' + otherReqs + '</span>';
      }
      
      reqHtml = '<div class="requirements-row"><span class="icon">📋</span> ' + tags + '</div>';
    }
    
    // 操作按钮
    var actionsHtml = '';
    if (j.wechat && j.wechat !== '未提供') {
      actionsHtml = '<button class="btn-wechat" onclick="copyWechat(this,\'' + j.wechat.replace(/'/g, "\\'") + '\')">复制微信</button>';
    }
    actionsHtml += '<button class="btn-map" onclick="openMap(\'' + j.area.replace(/'/g, "\\'") + '\')">📍 地图</button>';
    
    html += '<div class="job-card">' +
      '<div class="card-header">' +
        '<div class="title">' + j.title + '</div>' +
        '<div class="salary">' + j.salary + '</div>' +
      '</div>' +
      '<div class="card-source">' + sourceTags + dateStr + '</div>' +
      '<div class="card-info">' +
        '<div class="info-row"><span class="icon">📍</span><span class="label">地址：</span><span class="value highlight">' + j.area + '</span></div>' +
        shiftRowHtml +
        wechatHtml +
      '</div>' +
      reqHtml +
      '<div class="card-footer">' +
        '<div class="distance-info">' + distanceHtml + '</div>' +
        '<div class="actions">' + actionsHtml + '</div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

// 复制微信号
function copyWechat(btn, wechat) {
  var w = wechat.split('/')[0];
  if (navigator.clipboard) {
    navigator.clipboard.writeText(w).then(function() {
      btn.textContent = '已复制';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '复制微信';
        btn.classList.remove('copied');
      }, 1500);
    });
  } else {
    var input = document.createElement('input');
    input.value = w;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '复制微信';
      btn.classList.remove('copied');
    }, 1500);
  }
}

// 打开地图
function openMap(addr) {
  var url = 'https://uri.amap.com/search?keyword=' + encodeURIComponent(addr) + '&city=长沙';
  window.open(url, '_blank');
}

// 事件绑定
document.getElementById('areaFilters').addEventListener('click', function(e) {
  if (e.target.tagName === 'BUTTON') {
    var buttons = document.querySelectorAll('#areaFilters button');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.remove('active');
    }
    e.target.classList.add('active');
    currentArea = e.target.dataset.area;
    render();
  }
});

document.getElementById('sortSelect').addEventListener('change', function(e) {
  currentSort = e.target.value;
  render();
});

// 回到顶部
window.addEventListener('scroll', function() {
  var btn = document.getElementById('backToTop');
  if (window.scrollY > 300) {
    btn.classList.add('show');
  } else {
    btn.classList.remove('show');
  }
});

// 初始化
render();
</script>
