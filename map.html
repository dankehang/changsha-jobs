    // 当前筛选区域
    let currentFilter = '全部';
    let map = null;
    let markers = [];

    // 计算两点距离（公里）
    function getDistance(lng1, lat1, lng2, lat2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // 显示错误信息
    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.innerHTML = `
        <i class="fas fa-exclamation-circle"></i>
        <h3>地图加载失败</h3>
        <p>${message}</p>
        <button onclick="location.reload()">重新加载</button>
      `;
      document.body.appendChild(errorDiv);
    }

    // 清除所有标记
    function clearMarkers() {
      markers.forEach(function(marker) {
        marker.setMap(null);
      });
      markers = [];
    }

    // 添加兼职标记
    function addJobMarkers(filterDistrict) {
      clearMarkers();

      let nearbyCount = 0;
      let filteredJobs = jobsData;

      if (filterDistrict && filterDistrict !== '全部') {
        filteredJobs = jobsData.filter(function(job) {
          return job.district === filterDistrict;
        });
      }

      filteredJobs.forEach(function(job) {
        // 使用精确坐标
        const position = [job.lng, job.lat];

        // 计算距离
        const distance = getDistance(CENTER_POSITION[0], CENTER_POSITION[1], position[0], position[1]);
        if (distance <= 3) nearbyCount++;

        const marker = new AMap.Marker({
          position: position,
          title: job.title,
          icon: new AMap.Icon({
            size: new AMap.Size(24, 24),
            image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
            imageSize: new AMap.Size(24, 24)
          }),
          offset: new AMap.Pixel(-12, -24)
        });

        // 信息窗内容
        const infoContent = '<div class="info-window">' +
          '<h3>' + job.title + '</h3>' +
          '<div class="salary">' + job.salary + '</div>' +
          '<span class="district">' + job.district + '</span>' +
          '<div class="address"><i class="fas fa-map-marker-alt"></i> ' + job.area + '</div>' +
          '<div class="wechat"><i class="fab fa-weixin"></i> ' + job.wechat + '</div>' +
          '<button class="btn-copy" onclick="copyWechat(\'' + job.wechat + '\')">复制微信</button>' +
        '</div>';

        const infoWindow = new AMap.InfoWindow({
          content: infoContent,
          offset: new AMap.Pixel(0, -24)
        });

        marker.on('click', function() {
          infoWindow.open(map, marker.getPosition());
        });
        marker.setMap(map);
        markers.push(marker);
      });

      // 更新统计
      document.getElementById('nearby-jobs').textContent = nearbyCount;
      document.getElementById('total-jobs').textContent = filteredJobs.length;
    }

    // 初始化地图
    function initMap() {
      try {
        // 检查高德地图是否加载成功
        if (typeof AMap === 'undefined') {
          showError('高德地图 API 加载失败，请检查网络连接');
          return;
        }

        // 创建地图
        map = new AMap.Map('map-container', {
          center: CENTER_POSITION,
          zoom: 13,
          viewMode: '2D'
        });

        // 添加中心点标记（家）- 使用红色圆点
        const homeMarker = new AMap.Marker({
          position: CENTER_POSITION,
          title: '您的位置：万科城B区36栋',
          icon: new AMap.Icon({
            size: new AMap.Size(32, 32),
            image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
            imageSize: new AMap.Size(32, 32)
          }),
          offset: new AMap.Pixel(-16, -32)
        });
        homeMarker.setMap(map);

        // 添加中心点信息窗
        const homeInfo = new AMap.InfoWindow({
          content: '<div style="padding:10px;font-size:13px;"><b>🏠 您的位置</b><br>万科城B区36栋<br>开福区马厂<br>坐标: 112.995360, 28.247154</div>',
          offset: new AMap.Pixel(0, -32)
        });
        // 默认打开信息窗
        homeInfo.open(map, homeMarker.getPosition());
        homeMarker.on('click', function() {
          homeInfo.open(map, homeMarker.getPosition());
        });

        // 添加圆圈表示3公里范围
        const circle = new AMap.Circle({
          center: CENTER_POSITION,
          radius: 3000,
          strokeColor: '#667eea',
          strokeOpacity: 0.5,
          strokeWeight: 2,
          fillColor: '#667eea',
          fillOpacity: 0.1
        });
        circle.setMap(map);

        // 添加兼职标记
        addJobMarkers('全部');

        // 隐藏加载
        document.getElementById('loading').style.display = 'none';

        // 绑定筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(function(b) {
              b.classList.remove('active');
            });
            this.classList.add('active');
            currentFilter = this.getAttribute('data-district');
            addJobMarkers(currentFilter);
          });
        });

      } catch (error) {
        console.error('地图初始化错误:', error);
        showError('地图初始化失败: ' + error.message);
      }
    }

    // 复制微信
    function copyWechat(wechat) {
      if (wechat === '未提供' || wechat.includes('*')) {
        alert('该岗位未提供完整微信，请查看详情');
        return;
      }
      if (navigator.clipboard) {
        navigator.clipboard.writeText(wechat).then(function() {
          alert('已复制微信：' + wechat);
        });
      } else {
        const input = document.createElement('input');
        input.value = wechat;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('已复制微信：' + wechat);
      }
    }

    // 页面加载完成后初始化地图
    window.onload = function() {
      // 延迟加载确保高德地图脚本已加载
      setTimeout(function() {
        initMap();
      }, 1000);
    };
  </script>
